type Query {
    searchListings(prompt: String, filters: SearchFiltersInput): SearchResult!
}

type SearchResult {
    filters: SearchFilters!
    listings: [Listing!]!
    total: Int!
}

type Listing {
    id: ID!
    address: ListingAddress!
    price: Float!
    beds: Int
    baths: Float
    sqft: Int
    propertyType: String
    imageUrl: String
    listingUrl: String
    description: String
}

type ListingAddress {
    street: String
    city: String
    state: String
    zip: String
}

type SearchFilters {
    location: String
    minBeds: Int
    maxBeds: Int
    minBaths: Int
    maxBaths: Int
    minPrice: Float
    maxPrice: Float
    minSqft: Int
    maxSqft: Int
    minLotSqft: Int
    maxLotSqft: Int
    minYearBuilt: Int
    maxYearBuilt: Int
    newConstruction: Boolean
    propertyType: String
    features: [String!]!
    status: String
    locationRadius: Int
    noHoaFee: Boolean
    maxHoaFee: Float
    foreclosure: Boolean
    hasTour: Boolean
    dogs: Boolean
    cats: Boolean
    sortField: String
    sortDirection: String
}

input SearchFiltersInput {
    location: String
    minBeds: Int
    maxBeds: Int
    minBaths: Int
    maxBaths: Int
    minPrice: Float
    maxPrice: Float
    minSqft: Int
    maxSqft: Int
    minLotSqft: Int
    maxLotSqft: Int
    minYearBuilt: Int
    maxYearBuilt: Int
    newConstruction: Boolean
    propertyType: String
    features: [String!]!
    status: String
    locationRadius: Int
    noHoaFee: Boolean
    maxHoaFee: Float
    foreclosure: Boolean
    hasTour: Boolean
    dogs: Boolean
    cats: Boolean
    sortField: String
    sortDirection: String
}
